<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gurukul Senior Secondary School</title>
    <!-- Font Awesome for WhatsApp Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }

        .school-name {
            color: #1a237e;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .address {
            color: #555;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 40px;
        }

        /* Base Button Style */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Button 1: Continuous Color Changing (Warm Colors) */
        .btn-site {
            background: linear-gradient(90deg, #ff416c, #ff4b2b, #f7b733, #ff416c);
            background-size: 300%;
            animation: changeColor1 4s infinite linear;
        }

        @keyframes changeColor1 {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Button 2: Continuous Color Changing (Cool Colors - Different timing) */
        .btn-result {
            background: linear-gradient(90deg, #00c6ff, #0072ff, #1d976c, #00c6ff);
            background-size: 300%;
            animation: changeColor2 1s infinite ease-in-out reverse;
        }

        @keyframes changeColor2 {
            0% { background-position: 100% 50%; }
            50% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Button 3: Contact Us (Distinct Design) */
        .btn-contact {
            background-color: #333;
            color: #fff;
            margin-top: 35px;
            border: 2px solid #333;
            box-shadow: none;
        }

        .btn-contact:hover {
            background-color: #fff;
            color: #333;
        }

        /* Hidden Contact Box */
        .contact-box {
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            background: #e8f5e9;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #c8e6c9;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wa-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .wa-link:active {
            background-color: #128C7E;
        }
        
        .wa-link i {
            font-size: 22px;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1 class="school-name">Gurukul Senior Secondary School</h1>
        <p class="address">Bhadasar Road Dhankoli
        341516</p>

        <!-- Button 1: Visit Site -->
        <a href="https://gsssdhankoli.github.io" class="btn btn-site">
            Visit Our Site
        </a>

        <!-- Button 2: Check Result -->
        <a href="https://script.google.com/macros/s/AKfycbzXS0NOH9nSNZ56Bb1_ymQ5-XtivgYBvGXF0wA7uODMf2pcTT5l1r2eSlrbMj8u25CtFw/exec">
            Check G-SAT Result
        </a>

        <!-- Button 3: Contact Us -->
        <button class="btn btn-contact" onclick="toggleContact()">
            Contact Us
        </button>

        <!-- Hidden Contact Numbers (WhatsApp) -->
        <!-- Note: +91 is added automatically in the link so it directly opens Indian WhatsApp numbers -->
        <div class="contact-box" id="whatsapp-box">
            <a href="https://wa.me/919772564359" target="_blank" class="wa-link">
                <i class="fa-brands fa-whatsapp"></i> 9772564359
            </a>
            <a href="https://wa.me/919887071127" target="_blank" class="wa-link">
                <i class="fa-brands fa-whatsapp"></i> 9887071127
            </a>
        </div>
    </div>

    <script>
        function toggleContact() {
            var box = document.getElementById("whatsapp-box");
            if (box.style.display === "flex") {
                box.style.display = "none";
            } else {
                box.style.display = "flex";
            }
        }
    </script>

</body>
</html>
