<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurukul Shikshan Sansthan, Dhankoli</title>
<style>
  body {
    /* लाइट ब्राउन और येलो का मिक्स बैकग्राउंड */
    background: linear-gradient(135deg, #d2a679, #fff2a8);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* वाटरमार्क (नए बैकग्राउंड के हिसाब से एडजस्ट किया गया) */
  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-size: 18vw;
    color: rgba(139, 69, 19, 0.12); /* डार्क ब्राउन कम ओपेसिटी के साथ */
    font-weight: 900;
    white-space: nowrap;
    z-index: -1;
    pointer-events: none;
    letter-spacing: 10px;
  }

  /* ब्लैक और वायलेट मिक्स बॉक्स */
  .card {
    background: linear-gradient(135deg, #000000 30%, #5d00ff 100%);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    padding: 40px 30px;
    text-align: center;
    max-width: 450px;
    width: 100%;
    z-index: 1;
  }

  .logo-icon {
    font-size: 60px;
    margin-bottom: 15px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
  }

  h1 {
    background: linear-gradient(45deg, #12c2e9, #c471ed, #f64f59);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
    font-size: 28px;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.3;
    font-weight: 800;
  }

  h2 {
    color: #ffcc00;
    font-size: 22px;
    margin: 5px 0 20px;
    font-weight: 700;
  }

  .tagline {
    font-size: 18px;
    color: #e0e0e0;
    margin-bottom: 30px;
    font-weight: 600;
  }

  /* घूमती हुई रेनबो लाइन के लिए बटन रैपर */
  .btn-wrapper {
    position: relative;
    margin: 20px 0;
    padding: 4px; /* घूमती लाइन की मोटाई */
    border-radius: 50px;
    overflow: hidden;
    display: block;
  }

  .btn-wrapper::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(
      #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000
    );
    animation: spin-rainbow 3s linear infinite;
    z-index: 0;
  }

  @keyframes spin-rainbow {
    100% { transform: rotate(360deg); }
  }

  .btn {
    position: relative;
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 16px 20px;
    background: #0f0518;
    color: #ffffff;
    border-radius: 46px;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    z-index: 1;
    transition: all 0.3s ease;
  }

  .btn:hover {
    background: #1a0b2e;
    color: #ffcc00;
  }

  .footer-note {
    margin-top: 30px;
    font-size: 16px;
    color: #bfa3d9;
    font-weight: 600;
  }

  a {
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

  <div class="watermark">GURUKUL</div>

  <div class="card">
    <div class="logo-icon">🏫</div>
    <h1>Gurukul Shikshan Sansthan</h1>
    <h2>Dhankoli</h2>
    
    <div class="tagline">"उत्कृष्ट शिक्षा, उज्ज्वल भविष्य"</div>
    
    <div class="btn-wrapper">
      <a href="https://Gsssdhankoli.github.io" class="btn">
        🌐 More Information 
      </a>
    </div>
    
    <div class="btn-wrapper">
      <a href="https://harmonious-ganache-a83c81.netlify.app/" class="btn">
        🎓 Register Now
      </a>
    </div>
    
    <div class="footer-note">Contact us for a better future</div>
  </div>

</body>
</html>
